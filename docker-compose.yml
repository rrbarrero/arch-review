services:

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: ${APP_IMAGE:-arch-review-image:dev}
    container_name: arch-review-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - /workspace/.venv
    depends_on:
      pgvector:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: arch-review-pgvector
    environment:
      POSTGRES_DB: ${PGVECTOR_DATABASE:-arch_review}
      POSTGRES_USER: ${PGVECTOR_USER:-arch_review}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-arch_review_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: arch-review-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-arch_review_dev}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  dbmate:
    image: amacneil/dbmate
    user: "1000:1000"
    command: ["up"]
    volumes:
      - ./db:/db
    environment:
      DATABASE_URL: postgres://${PGVECTOR_USER}:${PGVECTOR_PASSWORD}@${PGVECTOR_HOST}:${PGVECTOR_PORT}/${PGVECTOR_DATABASE}?sslmode=disable
    depends_on:
      pgvector:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arch-review-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - app

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs-server
    ports:
      - "9000:9000" # S3 API port
      - "9001:9001" # Console port
    volumes:
      - ./storage/data:/data
      - ./storage/logs:/logs
    restart: unless-stopped

volumes:
  pgvector-data:
  neo4j-data:
